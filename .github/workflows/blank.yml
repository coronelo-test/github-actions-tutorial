# This is a basic workflow to help you get started with Actions

name: CI

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

permissions:
  contents: read
  packages: write

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  test_and_build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    env:
      platform: linux
      region: arg-south-america
      account: mi-cuenta-olga
      username: ${{secrets.USERNAME}}
      password: ${{secrets.PASSWORD}}

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Runs a single command using the runners shell
      - name: "Mostrar mensaje"
        run: echo "Hello, world!"
      - name: "Mostrar variables de entorno"
        #if: ${{ env.platform == 'azure' }}
        run: |
          echo "Platform: ${{ env.platform }}"
          echo "Region: ${{ env.region }}"
          echo "Account: ${{ env.account }}"

      - name: "Mostrando eventos"
        run: |
          echo "Event: ${{ toJSON(github.event) }}"
          echo "Repository: ${{ github.repository }}"
          echo "Actor: $GITHUB_ACTOR"

      - name: "Mostrando variables GitHub secret/variables"
        run: |
          echo "Username: ${{ env.username }}"
          echo "Password: ${{ env.password }}"
          echo "Project version: ${{ vars.PROJECT_VERSION}}"
      - uses: actions/checkout@v4
      - name: Set up Python 3.10
        uses: actions/setup-python@v3
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Test with pytest
        run: |
          pytest tests/test_calculator.py
